version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: qa_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  app:
    build: .
    container_name: qa_backend_app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:///./sql_app.db
      - MONGODB_URI=mongodb://mongodb:27017
      - MONGODB_DB_NAME=qa_generator
    depends_on:
      - mongodb
    volumes:
      - ./documents:/app/documents
      - ./generated:/app/generated
      - sqlite_data:/app
    restart: unless-stopped

volumes:
  mongodb_data:
  sqlite_data:
